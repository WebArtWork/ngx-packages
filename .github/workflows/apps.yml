name: Deploy to GitHub Pages

on:
    push:
        branches:
            - master

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'

            - name: Install dependencies
              run: npm install

            - name: Install dependencies
              run: npm install -g @angular/cli

            - name: Rebuild lightningcss
              run: npm rebuild lightningcss

            - name: Build App
              run: |
                ng build ngx-core-app
                ng build ngx-ui-app

            - name: Copy CNAME file
              run: |
                cp projects/ngx-core-app/CNAME dist/ngx-core-app/browser/
                cp projects/ngx-ui-app/CNAME dist/ngx-ui-app/browser/

            - name: Copy README file
              run: |
                cp projects/ngx-core/README.md dist/ngx-core-app/browser/
                cp projects/ngx-ui/README.md dist/ngx-ui-app/browser/

            - name: Set up SSH
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
              run: |
                  mkdir -p ~/.ssh
                  echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan github.com >> ~/.ssh/known_hosts

            - name: Commit and push to gh-pages using SSH
              env:
                  GIT_SSH_COMMAND: 'ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no'
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  cd dist/ngx-core-app/browser
                  git init  # Initialize a new git repository
                  git add --all .  # Add all changes
                  git commit -m "Deploy to GitHub Pages"
                  git checkout -B gh-pages  # Switch to gh-pages branch
                  git push git@github.com:WebArtWork/ngx-core.webart.work gh-pages --force
                  cd dist/ngx-ui-app/browser
                  git init  # Initialize a new git repository
                  git add --all .  # Add all changes
                  git commit -m "Deploy to GitHub Pages"
                  git checkout -B gh-pages  # Switch to gh-pages branch
                  git push git@github.com:WebArtWork/ngx-ui.webart.work gh-pages --force

            - name: Clean up SSH
              run: |
                  rm -f ~/.ssh/id_rsa
                  rm -f ~/.ssh/known_hosts
