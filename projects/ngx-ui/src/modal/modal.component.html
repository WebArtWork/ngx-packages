<div
	class="wawjs-modal"
	(click)="onBackdropClick()"
>
	<div
		[class]="contentClasses"
		(click)="$event.stopPropagation()"
	>
		<div class="wawjs-modal__body">
			<!-- content host -->
		</div>

		@if (closable) {
		<button
			wbutton
			[disableSubmit]="true"
			class="wawjs-modal__close material-icons"
			(wClick)="close()"
			aria-label="Close"
		>
			close
		</button>
		}
	</div>
</div>
