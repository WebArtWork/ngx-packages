<div class="app-shell">
	<header class="topbar">
		<a
			class="brand"
			routerLink="/"
			[translate]="{
				ariaLabel: 'Go to home page',
			}"
		>
			<img ngSrc="logo.png" width="40" height="40" priority alt="ngx-translate" />
		</a>

		<nav
			class="topbar-nav"
			[translate]="{
				ariaLabel: 'Service navigation',
			}"
		>
			@for (service of services; track service.slug) {
				<a
					class="topbar-link"
					[routerLink]="['/services', service.slug]"
					routerLinkActive="topbar-link-active"
				>
					{{ topbarLabel(service.name) }}
				</a>
			}
		</nav>

		<div class="topbar-actions">
			<div
				class="language-switcher"
				role="group"
				[translate]="{
					ariaLabel: 'Language switcher',
				}"
			>
				<span class="language-label" translate>Language</span>

				@for (language of languages(); track language.code) {
					<button
						type="button"
						class="language-button"
						[class.language-button-active]="isLanguage(language.code)"
						(click)="setLanguage(language.code)"
						[translate]="{
							ariaLabel: switchLanguageKey(language),
							title: language.name,
						}"
					>
						@if (languageFlag(language); as flag) {
							<img
								class="language-flag"
								[ngSrc]="flag"
								width="24"
								height="16"
								[attr.alt]="language.nativeName || language.name"
								/>
						}
						<span class="language-code">{{ languageCode(language) }}</span>
					</button>
				}
			</div>

			<button
				class="theme-toggle"
				(click)="toggleTheme()"
				[translate]="{
					ariaLabel: themeToggleKey(),
					title: 'Toggle dark/light mode',
				}"
			>
				@if (themeService.mode() === 'light') {
					<span class="theme-icon">&#9728;&#65039;</span>
				} @else {
					<span class="theme-icon">&#127769;</span>
				}
			</button>
		</div>
	</header>

	<main class="page-content">
		<router-outlet />
	</main>
</div>
